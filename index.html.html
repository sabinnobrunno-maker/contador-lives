<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Rajdhani:wght@600;700&display=swap');
        
        body {
            margin: 0;
            padding: 20px;
            background: transparent;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Container dos 3 blocos */
        .grid-container {
            display: flex;
            gap: 20px;
        }

        /* Bloco Individual (Estilo Glassmorphic Premium) */
        .card-tracker {
            background: rgba(15, 15, 18, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            width: 160px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease;
        }

        /* Identidade Visual de cada Rank (Bordas e Cores de Destaque) */
        .card-prata { border-top: 4px solid #a6a6a6; }
        .card-ouro { border-top: 4px solid #ffd700; }
        .card-diamante { border-top: 4px solid #00f2fe; }

        /* Nomes dos Ranks */
        .rank-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .text-prata { color: #e5e5e5; text-shadow: 0 0 8px rgba(255, 255, 255, 0.2); }
        .text-ouro { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .text-diamante { color: #00f2fe; text-shadow: 0 0 12px rgba(0, 242, 254, 0.4); }

        /* Estilo dos Números */
        .count-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 46px;
            font-weight: 700;
            line-height: 1;
            color: #ffffff;
            margin-bottom: 5px;
        }

        /* Barra de Total Geral Inferior */
        .total-bar {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 8px 30px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8e8e93;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #total-num {
            color: #ff3b30;
            font-weight: 800;
            margin-left: 5px;
        }

        /* Animação de pulsação ao atualizar */
        .bump { animation: pop 0.25s ease-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="grid-container">
    <!-- Bloco Prata -->
    <div class="card-tracker card-prata" id="box-prata">
        <span class="rank-title text-prata">Prata</span>
        <span class="count-value" id="num-prata">0</span>
    </div>

    <!-- Bloco Ouro -->
    <div class="card-tracker card-ouro" id="box-ouro">
        <span class="rank-title text-ouro">Ouro</span>
        <span class="count-value" id="num-ouro">0</span>
    </div>

    <!-- Bloco Diamante -->
    <div class="card-tracker card-diamante" id="box-diamante">
        <span class="rank-title text-diamante">Diamante</span>
        <span class="count-value" id="num-diamante">0</span>
    </div>
</div>

<!-- Totalizador Automático -->
<div class="total-bar">
    Total de Abates: <span id="total-num">0</span>
</div>

<script>
    // Inicialização dos contadores
    let prata = 0, ouro = 0, diamante = 0;

    const elPrata = document.getElementById('num-prata');
    const elOuro = document.getElementById('num-ouro');
    const elDiamante = document.getElementById('num-diamante');
    const elTotal = document.getElementById('total-num');

    const boxPrata = document.getElementById('box-prata');
    const boxOuro = document.getElementById('box-ouro');
    const boxDiamante = document.getElementById('box-diamante');

    // Mapeamento de Teclas do Teclado Numérico (Numpad)
    window.addEventListener('keydown', (e) => {
        switch(e.key) {
            // CONTROLE PRATA (Teclas 1 e 4 do Numpad)
            case '1': 
                prata++; 
                triggerUpdate(elPrata, boxPrata, prata);
                break;
            case '4': 
                if(prata > 0) { prata--; triggerUpdate(elPrata, boxPrata, prata); }
                break;

            // CONTROLE OURO (Teclas 2 e 5 do Numpad)
            case '2': 
                ouro++; 
                triggerUpdate(elOuro, boxOuro, ouro);
                break;
            case '5': 
                if(ouro > 0) { ouro--; triggerUpdate(elOuro, boxOuro, ouro); }
                break;

            // CONTROLE DIAMANTE (Teclas 3 e 6 do Numpad)
            case '3': 
                diamante++; 
                triggerUpdate(elDiamante, boxDiamante, diamante);
                break;
            case '6': 
                if(diamante > 0) { diamante--; triggerUpdate(elDiamante, boxDiamante, diamante); }
                break;
        }
    });

    function triggerUpdate(element, box, value) {
        element.innerText = value;
        
        // Atualiza o total geral
        elTotal.innerText = prata + ouro + diamante;

        // Dispara animação visual no bloco afetado
        box.classList.remove('bump');
        void box.offsetWidth; 
        box.classList.add('bump');
    }
</script>
</body>
</html>
